name: Build and Release CLI

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v0.1.0

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name dev-cli src/dev_cli/main.py

      - name: Rename binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/dev-cli dist/dev-cli-linux

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: rename dist\dev-cli.exe dev-cli-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-cli-${{ matrix.os }}
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-cli-ubuntu-latest
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-cli-windows-latest
          path: dist/

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dev-cli-linux
            dist/dev-cli-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}