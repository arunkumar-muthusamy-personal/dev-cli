name: Build and Release CLI

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v0.1.0

env:
  DEV_CLI_LLM_BASE_URL: "https://api.openai.com/v1"
  DEV_CLI_LLM_API_KEY: ""
  DEV_CLI_LLM_MODEL: ""

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v0.1.0
          TOML_VERSION=$(python - <<'EOF'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          EOF
          )
          EXPECTED="v${TOML_VERSION}"
          echo "Git tag:          $TAG"
          echo "pyproject.toml:   $TOML_VERSION  (expected tag: $EXPECTED)"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "❌ Version mismatch — update pyproject.toml to $TAG before tagging."
            exit 1
          fi
          echo "✅ Version match."

  build:
    runs-on: ${{ matrix.os }}
    needs: validate-version

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: dev-cli-linux
            artifact_name: dev-cli-ubuntu-latest
          - os: macos-latest
            binary_name: dev-cli-macos
            artifact_name: dev-cli-macos-latest
          - os: windows-latest
            binary_name: dev-cli-windows
            artifact_name: dev-cli-windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev]"

      - name: Build executable (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --onefile --name ${{ matrix.binary_name }} \
            --collect-all dev_cli \
            src/dev_cli/main.py

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --console --name ${{ matrix.binary_name }} `
            --collect-all dev_cli `
            src/dev_cli/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short

  release:
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-cli-ubuntu-latest
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-cli-macos-latest
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-cli-windows-latest
          path: dist/

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/dev-cli-linux
            dist/dev-cli-macos
            dist/dev-cli-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
