name: Build and Publish Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']

    steps:
    - name: Check out the repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install hatch pyinstaller

    - name: Build the package
      run: hatch build

    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --name dev-cli dev_cli/main.py

    - name: Archive executable
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: dev-cli-${{ matrix.os }}
        path: dist/

    - name: Publish to PyPI
      if: github.ref == 'refs/heads/main' && matrix.os == 'ubuntu-latest'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        pip install twine
        twine upload dist/*

  # Optionally, add separate job for testing executables
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Download the artifact
      uses: actions/download-artifact@v3
      with:
        name: dev-cli-ubuntu-latest

    - name: Run executable
      run: |
        chmod +x dist/dev-cli
        ./dist/dev-cli --help  # or any other command to verify functionality
